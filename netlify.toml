# ─── Build ────────────────────────────────────────────────────────────────────
[build]
  # Run from the monorepo root so npm workspaces installs all packages first,
  # then build only the web app.
  command = "npm run build --workspace=apps/web"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION            = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# ─── Next.js plugin ───────────────────────────────────────────────────────────
# Required for App Router, ISR, middleware, and server actions to work on Netlify.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─── Security headers (all routes) ───────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# Static assets from Next.js — immutable, 1-year cache
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
